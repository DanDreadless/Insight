server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames on build)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
